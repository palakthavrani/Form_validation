<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Form Validation System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container mt-5">
    <h2 class="text-center">Form Validation System</h2>

    <form id="form">

        <input type="text" id="name" class="form-control mt-3" placeholder="Full Name" onchange="validateName()">
        <small id="nameError" class="text-danger"></small>

        <input type="text" id="email" class="form-control mt-3" placeholder="Email" onchange="validateEmail()">
        <small id="emailError" class="text-danger"></small>

        <input type="text" id="phone" class="form-control mt-3" placeholder="Phone Number" onchange="validatePhone()">
        <small id="phoneError" class="text-danger"></small>

        <input type="password" id="password" class="form-control mt-3" placeholder="Password" onchange="validatePassword()">
        <small id="passError" class="text-danger"></small>

        <input type="password" id="confirmPassword" class="form-control mt-3" placeholder="Confirm Password" onchange="validateConfirm()">
        <small id="confirmError" class="text-danger"></small>

        <button type="submit" class="btn btn-primary mt-3 w-100">Submit</button>

    </form>
</div>

<script src="script.js"></script>
</body>
</html>
